<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Permissions-Policy" content="unload=()">
    <title>InsightRadar | Competitive Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <span class="logo-icon">📡</span>
                <h1>InsightRadar</h1>
            </div>
            <div class="nav-actions">
                <div id="status-indicator" class="status-indicator" style="display: none;"></div>
                <button id="refresh-btn" class="btn btn-primary">
                    <span class="icon">🔄</span> Scan Sources
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="dashboard-header">
            <div class="header-info">
                <h2>Product Intelligence Feed</h2>
                <p>Tracking the latest moves from PostHog, Mixpanel, Amplitude, and SensorsData.</p>
            </div>
            <div class="filters">
                <select id="date-range-filter" class="select-glass">
                    <option value="all">全部数据</option>
                    <option value="7">近 7 天</option>
                    <option value="30" selected>近 30 天</option>
                    <option value="90">近 90 天</option>
                    <option value="custom">自定义日期</option>
                </select>
                <div id="custom-date-range" class="custom-date-range" style="display: none;">
                    <input type="date" id="start-date" class="date-input">
                    <span style="color: var(--text-dim);">至</span>
                    <input type="date" id="end-date" class="date-input">
                </div>
                <select id="product-filter" class="select-glass">
                    <option value="">All Products</option>
                    <option value="PostHog">PostHog</option>
                    <option value="Mixpanel">Mixpanel</option>
                    <option value="Amplitude">Amplitude</option>
                    <option value="神策数据">神策数据</option>
                </select>
                <select id="type-filter" class="select-glass">
                    <option value="">All Types</option>
                    <option value="feature">Features</option>
                    <option value="blog">Blog Posts</option>
                    <option value="github">GitHub</option>
                </select>
            </div>
        </header>

        <section id="updates-feed" class="updates-grid">
            <!-- Updates will be injected here -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading the latest insights...</p>
            </div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
